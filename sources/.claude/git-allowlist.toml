# Extends the git-allowlist-hook with additional subcommands. The hook always
# permits the built-in read-only set (status, diff, log, show, branch,
# rev-parse, config, remote, ls-files, blame) plus anything listed here.
#
# Forbidden flags (--force, --no-verify, -f) and dangerous -c overrides still
# apply on top — adding "push" here does not let "git push --force" through.

allow = ["add"]
