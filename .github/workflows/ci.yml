name: ci
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  matrix-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v15
        with:
          name: runeword-terminal
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check -L --keep-going

  # Stable-name gate for branch protection — required-status context = "check".
  # Survives matrix changes; only this job's name is load-bearing.
  check:
    if: always()
    needs: matrix-check
    runs-on: ubuntu-latest
    steps:
      - if: ${{ !contains(needs.*.result, 'success') || contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
