name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  matrix-check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            access-tokens = github.com/Runeword=${{ secrets.PERMEANCE_TOKEN }}
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: runeword-terminal
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - run: nix flake check -L --keep-going
  # Stable-name gate for branch protection — required-status context = "check".
  # Survives matrix changes; only this job's name is load-bearing.
  check:
    if: always()
    needs: matrix-check
    runs-on: ubuntu-latest
    steps:
      - if: ${{ !contains(needs.*.result, 'success') || contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
