# tmux v3.5a

set -g default-shell "$TMUX_SHELL" # $SHELL (login shell) is the shell by default
set -g base-index 1
set -g pane-base-index 1
# set -g automatic-rename on
# set -g automatic-rename-format "#{I} #{b;=4:pane_current_path}_#{=4:pane_current_command}"
set-option -g automatic-rename on
# set-option -g automatic-rename-format '#{b:pane_current_path}'
set-option -g automatic-rename-format '#{=6:pane_current_command}'
set -g renumber-windows on
set -g display-time 500
set -g status-keys emacs
setw -g aggressive-resize off
setw -g clock-mode-style 12
set -g history-limit 50000
set -gw mouse on
set -gw mode-keys vi
set -g default-terminal "tmux-256color"
# set -g status-keys vi

# _________________________________ Key bindings

# Disable the prefix so C-b passes through to the shell (every binding below uses -n)
unbind C-b
set -g prefix None

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
# bind -n Escape if-shell "$is_vim" "send-keys Escape" "copy-mode -u"

bind -n C-Escape copy-mode
# bind -n C-Escape display-popup -E -b none -w 100% -h 100% 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_nvim_copy_mode'
# bind -n Pageup if-shell "$is_vim" "send-keys Pageup" "copy-mode; send-keys -X -N 10 cursor-up"
bind -T copy-mode-vi j send-keys -X cursor-down
bind -T copy-mode-vi k send-keys -X cursor-up
bind -T copy-mode-vi c-j send-keys -X -N 4 cursor-down \; send-keys -X back-to-indentation
bind -T copy-mode-vi c-k send-keys -X -N 4 cursor-up \; send-keys -X back-to-indentation
bind -T copy-mode-vi Pageup send-keys -X -N 10 cursor-up \; send-keys -X back-to-indentation
bind -T copy-mode-vi Pagedown send-keys -X -N 10 cursor-down \; send-keys -X back-to-indentation
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe clear-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi / command-prompt -i -p '' 'send-keys -X search-forward-incremental "%%%"'
bind -T copy-mode-vi ? command-prompt -i -p '' 'send-keys -X search-backward-incremental "%%%"'
bind -T copy-mode-vi Y send-keys -X copy-line

# https://github.com/tmux/tmux/issues/2705
bind -n BTab send-keys "\u001B[Z"
# bind -n C-BTab send-keys "\u001B[9;6u"
# bind -n C-S-Tab send-keys "\u001B[9;6u"
bind -n C-Tab select-window -t+1
bind -n C-BTab select-window -t-1
bind -n C-PgDn next-window
bind -n C-PgUp previous-window
bind -n C-S-PgUp swap-window -t -1\; select-window -t -1
bind -n C-S-PgDn swap-window -t +1\; select-window -t +1
# bind -n C-Enter send-keys "\u001B[13;5u"
bind -n S-Enter send-keys "\u001B[13;2u"
bind -n S-Space send-keys "\u001B[32;2u"
bind -n S-Escape send-keys "\u001B[27;2u"
# bind -n C-i send-keys "\u001B[105;5u"
# bind -n Tab send-keys "\t"

bind -n M-r source-file $PERMEANCE_TREE/.config/tmux/tmux.conf
bind -n M-q detach
bind -n M-K kill-server
bind -n M-N run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_kill_session'
bind -n M-W run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_save_window_state "#{pane_current_path}" "#{pane_current_command}"; __tmux_kill_pane prev'
bind -n M-w run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_save_window_state "#{pane_current_path}" "#{pane_current_command}"; __tmux_kill_pane next'
bind -n M-t new-window -a -c "#{pane_current_path}"
bind -n M-T run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_reopen_window'
bind -n M-n run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_new_session'

# bind -n M-N command-prompt 'rename-session %%'
# bind -n M-r command-prompt 'rename-window %%'
bind -n M-c command-prompt 'show-options -s'

bind -n M-h split-window -v -l 8
bind -n M-v split-window -h

# Toggle a right-side pane with the live status of all running Claude sessions
bind -n M-s run-shell 'sh $PERMEANCE_TREE/.config/tmux/scripts/claude-sessions.sh 44'

# Toggle a bottom pane running the flake watcher (watch -> nix flake check)
# bind -n M-b run-shell 'sh $PERMEANCE_TREE/.config/tmux/scripts/watch-build.sh 8'

bind -n M-Tab select-pane -t+1
bind -n M-BTab select-pane -t-1
bind -n M-PageDown select-window -t+1
bind -n M-PageUp select-window -t-1
bind -n M-Down select-window -t+1
bind -n M-Up select-window -t-1
bind -n C-S-PageDown swap-window -t+1 \; select-window -t+1
bind -n C-S-PageUp swap-window -t-1 \; select-window -t-1
bind -n C-S-Down swap-window -t+1 \; select-window -t+1
bind -n C-S-Up swap-window -t-1 \; select-window -t-1
bind -n C-S-k swap-window -t+1 \; select-window -t+1
bind -n C-S-j swap-window -t-1 \; select-window -t-1
bind -n C-Space run-shell 'sh $PERMEANCE_TREE/.config/tmux/scripts/toggle-pane.sh 15'
bind -n C-Enter switch-client -n
bind -n C-S-Enter switch-client -p
bind -n C-M-Enter run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_move_window_to_session next'
bind -n C-M-S-Enter run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_move_window_to_session prev'

bind -n M-1 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 1'
bind -n M-2 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 2'
bind -n M-3 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 3'
bind -n M-4 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 4'
bind -n M-5 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 5'
bind -n M-6 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 6'
bind -n M-7 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 7'
bind -n M-8 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 8'
bind -n M-9 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 9'
bind -n M-0 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 10'

bind -n C-1 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 1'
bind -n C-2 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 2'
bind -n C-3 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 3'
bind -n C-4 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 4'
bind -n C-5 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 5'
bind -n C-6 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 6'
bind -n C-7 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 7'
bind -n C-8 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 8'
bind -n C-9 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 9'
bind -n C-0 run-shell 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_or_create_window 10'

bind -n C-S-1 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 1'
bind -n C-S-2 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 2'
bind -n C-S-3 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 3'
bind -n C-S-4 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 4'
bind -n C-S-5 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 5'
bind -n C-S-6 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 6'
bind -n C-S-7 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 7'
bind -n C-S-8 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 8'
bind -n C-S-9 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 9'
bind -n C-S-0 run-shell -b 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_swap_or_create_window 10'

# bind -n M-n display-popup -E 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_new_session'
bind -n M-Enter display-popup -E 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_session'
bind -n M-S-Enter display-popup -E 'source $PERMEANCE_TREE/.config/shell/functions/tmux.sh; __tmux_switch_window'

bind -n M-S run-shell $NIX_OUT_TMUX/.config/tmux/plugins/resurrect/scripts/save.sh
bind -n M-R run-shell $NIX_OUT_TMUX/.config/tmux/plugins/resurrect/scripts/restore.sh
# bind -n M-l run-shell -b '$NIX_OUT_TMUX/.config/tmux/plugins/tmux-fzf/scripts/window.sh switch'

# _________________________________ Status

set -g status-interval 1
set -g status-style bg=default
set -g status-position top
set -g status-right ""
set -g status-left-length 200
# range=session makes each name left-clickable: fires the default MouseDown1Status (switch-client -t =)
set -g status-left "#{S:#[range=session|#{session_id}]#[fg=#7a7c9e]#{session_name}  #[norange],#[range=session|#{session_id}]#[fg=#ffffff]#{session_name}  #[norange]}"
set -g status-justify centre
set -g window-status-current-format "#[fg=#ffffff]#I #W"
set -g window-status-format "#[fg=#7a7c9e]#I #W"
set -g window-status-separator "  "

# _________________________________ Colors

set -g copy-mode-match-style "bg=#5d00ff"
set -g copy-mode-current-match-style "bg=#ffffff,fg=#000000"
set -g mode-style "reverse"
set -g message-style "fg=#ffffff,bg=default"
set -g message-command-style "fg=#ffffff,bg=default"
set -g pane-border-style "fg=#262e3b"
set -g pane-active-border-style "fg=#4a4aa8"
set -g popup-border-style "fg=#262e3b"
# cursor-style

# _________________________________ Server options

set -s escape-time 0
# pasting newline in neovim puts ^[[27;5;106~ chars
# https://github.com/tmux/tmux/issues/4175
# https://github.com/tmux/tmux/issues/4163
# set -s extended-keys off
# set -s extended-keys on
set -s extended-keys always # https://github.com/tmux/tmux/issues/2705 (< tmux 3.5)
set -s focus-events on
set -g allow-passthrough all
# set -s terminal-overrides $TERM
set -sa terminal-overrides ",alacritty:RGB" # true color support
set -sa terminal-overrides ',alacritty:Smulx=\E[4::%p1%dm' # undercurl support
set -sa terminal-overrides ',alacritty:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # underscore colours
set -sa terminal-overrides ',alacritty:smcup@:rmcup@' # disable faux scrolling

# _________________________________ Autoload

run-shell $NIX_OUT_TMUX/.config/tmux/plugins/resurrect/resurrect.tmux

# _________________________________ Plugins options

set -g @resurrect-dir "$HOME/.local/state/tmux/plugins/resurrect"
